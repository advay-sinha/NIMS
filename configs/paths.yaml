# NetSentinel — Path Configuration
#
# Single source of truth for every filesystem location. Code must resolve
# paths exclusively through this configuration (see src/utils/paths.py).
#
# All paths are relative to the repository root unless absolute. The raw
# dataset directories point at the vendor layout currently on disk; they are
# treated as READ-ONLY and must never be written to (see CLAUDE.md > Dataset
# Rules: "Nothing should overwrite raw data").

paths:
  # Repository-relative base directories.
  data_dir: data
  datasets_dir: datasets        # raw, read-only vendor datasets
  models_dir: models
  outputs_dir: outputs
  logs_dir: outputs/logs

  # Data pipeline stages (Raw -> Interim -> Processed -> Features).
  interim_dir: data/interim
  processed_dir: data/processed
  features_dir: data/features
  metadata_dir: data/metadata
  reports_dir: outputs/reports
  data_reports_dir: outputs/data_reports
  fingerprints_dir: outputs/metadata
  figures_dir: outputs/figures

  # Phase 2 preprocessing outputs. Each pipeline run namespaces its artefacts
  # under a per-dataset subdirectory (e.g. outputs/processed/nsl_kdd/) so that
  # running multiple datasets never overwrites another's outputs.
  preprocessing_dir: outputs/preprocessing
  processed_out_dir: outputs/processed
  artifacts_dir: outputs/artifacts

  # Raw dataset roots. Names contain spaces / vendor quirks on disk, so they
  # are spelled out explicitly here rather than derived from the dataset id.
  raw:
    nsl_kdd: "datasets/NSL-KDD"
    unsw_nb15: "datasets/UNSW_NB15"
    cicids2017: "datasets/CIC-IDS- 2017"
    snmp: "datasets/SNMP 2016 dataset"
