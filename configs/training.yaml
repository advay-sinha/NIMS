# =============================================================================
# NetSentinel — Engine A Training Configuration
# =============================================================================
#
# Baseline model training configuration for the Network Intrusion Detection
# System.
#
# Principles:
# - Fully configuration-driven.
# - No hardcoded hyperparameters.
# - GPU selected through src/utils/hardware.py.
# - Deterministic experiments.
# - Every run saved independently.
#
# =============================================================================

training:
  # ---------------------------------------------------------------------------
  # Reproducibility
  # ---------------------------------------------------------------------------
  random_seed: 42

  # Default model for single-model execution.
  active_model: xgboost

  # Models trained when --all-models is supplied.
  models:
    - xgboost
    - lightgbm
    - isolation_forest

  # Prefer GPU whenever supported.
  use_gpu: true

  # Defensive guard: the training matrix must exceed this many rows, otherwise
  # training aborts (catches accidental subsets / wrong-data loading).
  min_train_rows: 1000

  # ---------------------------------------------------------------------------
  # Evaluation
  # ---------------------------------------------------------------------------
  evaluation:
    average: weighted
    save_confusion_matrix: true
    save_classification_report: true
    save_feature_importance: true

  # ---------------------------------------------------------------------------
  # Experiment Tracking
  # ---------------------------------------------------------------------------
  experiment:
    root_subdir: experiments
    save_model: true
    save_metrics: true
    save_manifest: true
    save_predictions: false

  # ---------------------------------------------------------------------------
  # Logging
  # ---------------------------------------------------------------------------
  logging:
    log_training_time: true
    log_gpu_memory: true
    log_peak_ram: true
    log_model_size: true

# =============================================================================
# Model Configurations
# =============================================================================

models:

  # ===========================================================================
  # XGBoost
  # ===========================================================================
  xgboost:

    enabled: true
    gpu: true

    params:

      # Ensemble
      n_estimators: 400
      max_depth: 8

      # Learning
      learning_rate: 0.10

      # Sampling
      subsample: 0.90
      colsample_bytree: 0.90

      # GPU
      tree_method: hist
      device: cuda

      # Objective
      objective: multi:softprob

      # Metric
      eval_metric: mlogloss

      # Randomness
      random_state: 42

      # Parallelism
      n_jobs: -1

      # Optional (trainer should use validation set)
      early_stopping_rounds: 30

  # ===========================================================================
  # LightGBM
  # ===========================================================================
  lightgbm:

    enabled: true
    gpu: true

    params:

      n_estimators: 400

      learning_rate: 0.10

      num_leaves: 63

      max_depth: -1

      subsample: 0.90

      colsample_bytree: 0.90

      # GPU
      device: gpu

      # Recommended for GPU
      max_bin: 63

      random_state: 42

      n_jobs: -1

  # ===========================================================================
  # Isolation Forest
  # ===========================================================================

  isolation_forest:

    enabled: true

    gpu: false

    params:

      n_estimators: 200

      max_samples: auto

      contamination: auto

      bootstrap: false

      random_state: 42

      n_jobs: -1